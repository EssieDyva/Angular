<mat-card appearance="outlined">
  <mat-card-header>
    <mat-card-title>Dettaglio contatto di {{persona.nome}} {{persona.cognome}}</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <li>Colore preferito: {{persona.colore}}</li>
    <li><label>Status<p class="cerchio" [ngClass]="{'cerchioOnLine': persona.isOnline,
                                                    'cerchioOffLine': !persona.isOnline}"></p></label></li>
  </mat-card-content>
</mat-card>
