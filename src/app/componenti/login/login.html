<div class="container">
    <h1>Login</h1>
    <form #loginForm="ngForm" (ngSubmit)="onSubmit()">
        <mat-form-field>
            <mat-label>UserName</mat-label>
            <input matInput type="text" name="userName" placeholder="Introdurre username" ngModel required>
        </mat-form-field>
        <mat-form-field>
            <mat-label>Password</mat-label>
            <input matInput type="password" name="password" placeholder="Introdurre password" ngModel required>
        </mat-form-field>

        <p style="color: red;">{{msg()}}</p>

        <div class="button-group">
            <button class="btn btn-primary" type="submit" [disabled]="!loginForm.valid">Login</button>
            <button class="btn btn-secondary" type="button" (click)="onRegister()">Register</button>
        </div>
    </form>
</div>
