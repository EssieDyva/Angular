@for (
    persona of persone;
    track persona;
    let i = $index;

  ) {
    <li>
      <div class="cerchio"
      [ngClass]="{cerchioOnLine: persona.isOnline,
                  cerchioOffLine: !persona.isOnline}">
                  {{i}}
      </div>
      <p>
        {{ persona.nome }} {{ persona.cognome }}
      </p>
    </li>
  }
<button mat-stroked-button (click)="mandaDati()">Invia msg</button>
