<form #homeForm="ngForm" (ngSubmit)="onSubmit()">
  <mat-form-field>
    <mat-label>Nome</mat-label>
    <input matInput type="text" name="nome" formControlName="nome" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Cognome</mat-label>
    <input matInput type="text" name="cognome" formControlName="cognome" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Email</mat-label>
    <input matInput type="email" name="email" formControlName="email" />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Colore</mat-label>
    <mat-select name="colore" name="email" formControlName="colore">
      <mat-option value="green">Verde</mat-option>
      <mat-option value="red">Rosso</mat-option>
      <mat-option value="grey">Grigio</mat-option>
      <mat-option value="blue">Blu</mat-option>
      <mat-option value="pink">Rosa</mat-option>
    </mat-select>
  </mat-form-field>

  <button mat-raised-button color="primary" type="submit" [disabled]="!homeForm.valid"></button>
</form>
